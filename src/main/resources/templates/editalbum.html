<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
    <title>Levylaari Edit Album</title>
</head>
<body>
    <h1>Edit Album Info</h1>

    <div>
        <form th:object="${album}" th:action="@{/save}" method="post">
            <input type="hidden" th:field="*{albumId}">

            <label for="title">Title: </label>
	        <input type="text" id="title" th:field="*{title}" /><br>

            <label for="artist">Artist: </label>
	        <input type="text" id="artist" th:field="*{artist}" /><br>

            <label for="releaseYear">Release Year: </label>
	        <input type="number" id="releaseYear" th:field="*{releaseYear}" /><br>

            <label for="trackCount">Track Count: </label>
	        <input type="number" id="trackCount" th:field="*{trackCount}" /><br>

            <label for="genre">Genre: </label>
	        <select th:field="*{genre}">
                <option th:each="genre: ${genres}"
                        th:value="${genre.genreId}"
                        th:text="${genre?.genreName}">
                </option>
            </select><a href="/addgenre"> Add or Edit Genre</a><br>
            <input type="submit" value="Edit Album"></input>

        </form>
    </div>
    
</body>
</html>
