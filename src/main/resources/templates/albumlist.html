<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levylaari Listaus</title>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center">
        <h2>LEVYLAARI</h2>
        <button> Log Out</button>
    </div>
    <table>
        <tr>
            <th>Album ID</th>
            <th>Title</th>
            <th>Artist</th>
            <th>Release Year</th>
            <th>Track Count</th>
            <th>Genre</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>

        <tr th:each="album : ${albums}">
            <td th:text="${album.albumId}"></td>
            <td th:text="${album.title}"></td>
            <td th:text="${album.artist}"></td>
            <td th:text="${album.releaseYear}"></td>
            <td th:text="${album.trackCount}"></td>
            <td th:text="${album.genre?.genreName}"></td>
            <td><a th:href="@{/edit/{albumId}(albumId=${album.albumId})}">Edit Album</a></td>
            <td><a th:href="@{/delete/{albumId}(albumId=${album.albumId})}">Delete Album</a></td>
        </tr>
    </table>
    <a href="/addalbum">Add New Album</a>
</body>
</html>
